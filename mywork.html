<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>consistency pays.</title>
    <link rel="stylesheet" href="mywork.css">
</head>
<body>

    <nav>
        <h2 class="logo" id="logo">Brian`s site.</h2>

        <ul class="nav-links" id="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <button id="themeToggle">🌙</button>
        
    </nav>

    <section id="home" class="home">
        <h1>Hello, I'm a Web Developer</h1>
        <p class="me">I build modern and interactive websites.</p>
        <button id="btn1">Explore More</button>
    </section>

     <div class="middle">
    <section id="about">
        <h2>About Me</h2>
        <p>I love creating beautiful and functional websites.</p>
    </section>

    <section id="services">
        <h2>Services</h2>
        <div class="cards">
            <div class="card">Web Design</div>
            <div class="card">Frontend Development</div>
            <div class="card">UI/UX Design</div>
        </div>
    </section>
</div>

<div class="lastsection">
    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contactform">
            <input type="text" id="name" placeholder="Your Name">
            <input type="email" id="email" placeholder="Your Email">
            <textarea rows="5" id="message" placeholder="Your Message"></textarea>
            <button id="btn2" type="submit">Send</button>
        </form>
        <p id="formmessage"></p>
    </section>
</div>
    <button id="btn3">↑</button>
    <footer>

    </footer>
