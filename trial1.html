<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
</head>
<body>
    <div>
            <h1>Create your account</h1>
            <p>Email</p>
            <input type="email" placeholder="you@example.com">
            <p>Password</p>
            <input type="password" placeholder="Min. 8 characters">
            <p>Confirm Password</p>
            <input type="password" placeholder="Re-enter password">
            <button>Create account</button>
    </div>
</body>
<style>
    body{
        justify-items: center;
        padding-top: 150px;
    }
    *{
        padding: 0;
        margin: 0;

    }
    div{
        width: 350px;
        height: 400px;
        background-color: white;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 5px 20px 90px -50px #23233b;
    }
    h1{
        text-align: center;
        padding-bottom: 20px;
        padding-top: 20px;
        font-size: 25px;
    }
    p{
        text-align: center;
        font-weight: bold;
        color: #23233b;
    }
    input{
        height: 25px;
        border: 0.5px solid grey;
        border-radius: 20px;
        padding: 10px;
   }
   button{
    height:35px ;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    background-color: #23233b;
    color: white;
   }
</style>
</html>
