<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise</title>
</head>

    <body>
        <div> 
             <h1>Subscribe to premium</h1>
               <p>Subscribe to earn new features and if eligible,
                 receive a share of revenue</p> 
                <button>Subscribe</button>
         </div>
      <style>
    button{
        background-color: aqua;  
        color: white;
        width: 140px;
        height: 50px;
        font-size: 23px;
        font-weight: bold;
        border: none;
        border-radius: 25px;
        cursor: pointer;
         }
         button:hover{
            background-color: white;
            color: black;
            transition: 1s;
         }
    div{
        background-color: black;
        width: 430px;
        height: 190px;
        padding-top: 1px;
        padding-left: 10px;
        padding-bottom: 9px;
        margin-top: 150px;
        margin-left: 250px;
        border-radius: 25px;
        box-shadow: 10px 15px 15px 5px rgb(40, 203, 240);
    }
    h1{
        color: white;
    }
    p{
        color: rgb(218, 211, 211);
        font-size: 18px;
        margin-bottom: 15px;
    }
       </style>
    </body>
</html>
