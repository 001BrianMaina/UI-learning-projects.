<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login correction.</title>
</head>
    <style>
    body{
        justify-items: center;
        background-color: #23233b;
    } 
    *{
        padding: 0px;
        margin: opx;
        box-sizing: border-box;
    }
        div{
            background-color: #23233b;
            width: 300px;
            height: 330px;
            border-radius: 20px;
            box-shadow: 10px 10px 70px 20px #beee10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }
        div:hover{
            box-shadow: 10px 10px 70px 20px #23233b;
            transition: ease-in-out 3s;
        }
        h1{
            padding-left: 0px;
            padding-top: 0px;
            color: white;
            text-align: center;
        }
        input{
           height: 38px;
           outline: none;
           border-radius: 5px;
           border: none;
           font-size: 15px;
           padding-left: 10px;
        }
        button{
            height: 38px;
            border-radius: 5px;
            border: none;
            outline: none;
            background-color: #fffb16;
            color: #23233b;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
              }
              button:hover{
                background-color: #23233b;
                border: 2px solid #ffffff;
                color: white;
                transition: 1s;
              }
        p{
            font-weight: bold;
            padding: 0px;
            margin: 0;
            text-align: center;
        }
       .Text1{
                color: white;
            }
       .Text2{
                color: #fffb16;
                font-weight: bold;
                cursor: pointer;
       }     
        
    </style>
    <body>
    <div>
       <h1>Welcome Back 🙋</h1>
       <input type="email" placeholder="Enter your email"> 
       <input type="password" placeholder="Enter your password">
       <button>Log in</button>
       <p>
           <span class="Text1">Don`t you have an account?</span>
           <span class="Text2">Sign Up</span>
       </p>
    </div>
</body>
</html>
<!-- Notes
 1. theres span used to style different parts of a sentence
 2. there *{} used to remove automatic spacing
 3. theres display and flex used to arrange things in div.
 4. theres gap used to put space between inputs or button.
 5. theres text align used to place text alignments.
 6. the padding added under div gives th elemnts space from the border equally.
 7. theres outline that removes the rectangular rectangle when u select the box.
 8. theres border setting to none which removes the ka black border surrounding the boxes.
 9. theres class that is used to differentiate two similar functions e.g span.
 -->
